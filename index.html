<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --background-color: #f8f9fa;
            --text-color: #333;
            --white: #ffffff;
            --error-color: #dc3545;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin: 1rem;
        }

        h1 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="text"] {
            padding: 0.75rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: var(--secondary-color);
            cursor: not-allowed;
        }

        #status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        .error {
            color: var(--error-color);
        }

        .loading {
            color: var(--primary-color);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            margin: 1rem auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Downloader</h1>
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Paste video URL here (YouTube, etc.)" required>
            <button id="downloadBtn">Download Video</button>
        </div>
        <div id="spinner" class="spinner"></div>
        <div id="status"></div>
    </div>

    <script>
        const downloadBtn = document.getElementById('downloadBtn');
        const videoUrlInput = document.getElementById('videoUrl');
        const statusDiv = document.getElementById('status');
        const spinner = document.getElementById('spinner');

        downloadBtn.addEventListener('click', async () => {
            const url = videoUrlInput.value.trim();
            
            if (!url) {
                showStatus('Please enter a valid URL', 'error');
                return;
            }

            // Simple URL validation
            try {
                new URL(url);
            } catch (e) {
                showStatus('Invalid URL format', 'error');
                return;
            }

            // Start download process
            showStatus('Processing your video, please wait...', 'loading');
            toggleLoading(true);

            try {
                // We'll use a direct link to the download API for the browser to handle
                // This allows the browser to show the download progress
                const downloadApiUrl = `/api/download?url=${encodeURIComponent(url)}`;
                
                // We'll create a temporary link and click it to trigger the download
                const link = document.createElement('a');
                link.href = downloadApiUrl;
                link.setAttribute('download', 'video.mp4');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // We reset the UI after a few seconds
                setTimeout(() => {
                    showStatus('Download started!', 'loading');
                    toggleLoading(false);
                }, 3000);

            } catch (error) {
                console.error('Download error:', error);
                showStatus('Failed to start download. Please try again.', 'error');
                toggleLoading(false);
            }
        });

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = type || '';
        }

        function toggleLoading(isLoading) {
            downloadBtn.disabled = isLoading;
            spinner.style.display = isLoading ? 'block' : 'none';
        }
    </script>
</body>
</html>
