<!DOCTYPE html>
<html>
<head>
  <title>My Video App</title>
</head>
<body>
  <h2>Video Downloader</h2>

  <input type="text" id="url" placeholder="Paste video link here" style="width:300px;">
  <br><br>
  <button onclick="download()">Download</button>

  <script>
    function download() {
      var link = document.getElementById("url").value;
      alert("Downloading: " + link);
    }
  </script>
</body>
</html>
